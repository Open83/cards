<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reasons Why I Love You ❤️</title>
    <style>
        :root {
            --bg-color: #fff8f8;
            --primary-accent: #ff5c8a;
            --card-bg: #ffffff;
            --text-color: #333333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow: hidden; /* Prevents scrolling and locks layout */
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* --- Background Floating Hearts --- */
        #hearts-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            bottom: -10vh;
            font-size: 1.5rem;
            color: var(--primary-accent);
            opacity: 0;
            animation: floatUp linear infinite;
            user-select: none;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8) rotate(0deg); opacity: 0; }
            20% { opacity: 0.15; }
            80% { opacity: 0.15; }
            100% { transform: translateY(-110vh) scale(1.2) rotate(45deg); opacity: 0; }
        }

        /* --- Screen Layouts --- */
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.6s ease;
            z-index: 10;
            padding: 20px;
        }

        .screen.active {
            display: flex;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-color);
        }

        p {
            font-size: 1.1rem;
            color: #666666;
            margin-bottom: 30px;
        }

        /* --- UI Elements --- */
        button {
            background-color: var(--primary-accent);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 92, 138, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 92, 138, 0.4);
        }

        button:active {
            transform: translateY(2px) scale(0.97);
            box-shadow: 0 4px 10px rgba(255, 92, 138, 0.3);
        }

        #progress {
            position: absolute;
            top: 5vh;
            right: 5vw;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-accent);
            background: rgba(255, 92, 138, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
        }

        /* --- Card Animation System --- */
        #card-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 280px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: var(--shadow);
            width: 100%;
            position: absolute;
            top: 50%; left: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* 60fps hardware accelerated animations */
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
            will-change: transform, opacity;
        }

        #card-text {
            font-size: 1.3rem;
            line-height: 1.6;
            margin: 0;
            font-weight: 500;
            color: var(--text-color);
        }

        /* Card States */
        .card.active {
            transform: translate(-50%, -50%) rotate(0deg) scale(1);
            opacity: 1;
            z-index: 2;
        }

        .card.out {
            transform: translate(-50%, -80%) rotate(5deg) scale(0.95);
            opacity: 0;
            z-index: 2;
        }

        .card.in {
            transform: translate(-50%, -20%) rotate(-5deg) scale(0.9);
            opacity: 0;
            transition: none; /* Instantly snap to start position */
            z-index: 1;
        }

        /* --- Responsive Tweaks --- */
        @media (max-width: 400px) {
            #card-container {
                height: 250px;
            }
            .card {
                padding: 30px 20px;
            }
            #card-text {
                font-size: 1.15rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <div id="hearts-container"></div>

    <section id="welcome-screen" class="screen active">
        <h2>For Someone Very Special ❤️</h2>
        <p>I made this little thing just for you.</p>
        <button id="start-btn">Start</button>
    </section>

    <section id="main-screen" class="screen">
        <div id="progress">1 / 10</div>
        
        <div id="card-container">
            <div id="card" class="card active">
                <p id="card-text"></p>
            </div>
        </div>
        
        <button id="next-btn">Next ❤️</button>
    </section>

    <section id="end-screen" class="screen">
        <h2>And these are only a few reasons...</h2>
        <p>I'd need a lifetime to tell you the rest. ❤️</p>
        <button id="shuffle-btn">Shuffle Again ❤️</button>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // DOM Elements
            const welcomeScreen = document.getElementById("welcome-screen");
            const mainScreen = document.getElementById("main-screen");
            const endScreen = document.getElementById("end-screen");

            const startBtn = document.getElementById("start-btn");
            const nextBtn = document.getElementById("next-btn");
            const shuffleBtn = document.getElementById("shuffle-btn");

            const card = document.getElementById("card");
            const cardText = document.getElementById("card-text");
            const progress = document.getElementById("progress");
            const heartsContainer = document.getElementById("hearts-container");

            // Reasons Array
            const originalReasons = [
                "Your smile brightens even my darkest days.",
                "The way you care so deeply for the people you love.",
                "Your incredible sense of humor that always makes me laugh.",
                "How you support my dreams and push me to be better.",
                "The gentle way you hold my hand when we walk.",
                "Your passion and drive for the things you believe in.",
                "The comforting sound of your voice when we talk for hours.",
                "How you remember the little details about me.",
                "The way you look at me like I'm the only person in the room.",
                "Simply because you are you, and that is more than enough."
            ];

            // State
            let currentReasons = [...originalReasons];
            let currentIndex = 0;

            // Generate CSS-only Floating Hearts
            function initHearts() {
                for (let i = 0; i < 20; i++) {
                    let heart = document.createElement("div");
                    heart.innerHTML = "❤️";
                    heart.className = "heart";
                    heart.style.left = Math.random() * 100 + "vw";
                    heart.style.animationDelay = Math.random() * 5 + "s";
                    heart.style.animationDuration = 8 + Math.random() * 10 + "s";
                    heartsContainer.appendChild(heart);
                }
            }

            // Smooth Screen Transitions
            function switchScreen(hideScreen, showScreen) {
                hideScreen.style.opacity = "0";
                setTimeout(() => {
                    hideScreen.classList.remove("active");
                    showScreen.classList.add("active");
                    
                    // RequestAnimationFrame ensures display:flex is painted before opacity transition
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            showScreen.style.opacity = "1";
                        });
                    });
                }, 600); // Matches CSS transition duration
            }

            // Render text and progress marker
            function renderCard(index) {
                cardText.textContent = currentReasons[index];
                progress.textContent = `${index + 1} / ${currentReasons.length}`;
            }

            // True Random Shuffle (Fisher-Yates Algorithm)
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
            }

            // Event Listeners
            startBtn.addEventListener("click", () => {
                renderCard(currentIndex);
                switchScreen(welcomeScreen, mainScreen);
            });

            nextBtn.addEventListener("click", () => {
                // Prevent rapid double clicks from breaking animation sequence
                nextBtn.style.pointerEvents = "none";

                // Trigger exit animation
                card.classList.remove("active");
                card.classList.add("out");

                setTimeout(() => {
                    currentIndex++;

                    if (currentIndex >= currentReasons.length) {
                        switchScreen(mainScreen, endScreen);
                        nextBtn.style.pointerEvents = "auto";
                    } else {
                        // Reset card to "in" position instantly
                        card.classList.remove("out");
                        card.classList.add("in");
                        renderCard(currentIndex);

                        // Trigger enter animation
                        requestAnimationFrame(() => {
                            requestAnimationFrame(() => {
                                card.classList.remove("in");
                                card.classList.add("active");
                                nextBtn.style.pointerEvents = "auto";
                            });
                        });
                    }
                }, 600);
            });

            shuffleBtn.addEventListener("click", () => {
                shuffleArray(currentReasons);
                currentIndex = 0;
                renderCard(currentIndex);
                
                // Reset card position before showing main screen again
                card.classList.remove("out", "in");
                card.classList.add("active");
                
                switchScreen(endScreen, mainScreen);
            });

            // Initialize app
            initHearts();
            welcomeScreen.style.opacity = "1";
        });
    </script>
</body>
</html>
