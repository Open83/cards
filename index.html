<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Reasons Why I Love You ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#fff8f8;
    --accent:#ff5c8a;
    --accent-dark:#e8487a;
    --accent-tint:#ffe6ec;
    --card-bg:#ffffff;
    --text:#333333;
    --text-soft:#9a9a9a;
    --shadow:0 10px 30px rgba(0,0,0,0.08);
    --shadow-strong:0 18px 40px rgba(255,92,138,0.25);
    --ease:cubic-bezier(.22,1,.36,1);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Plus Jakarta Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    min-height:100dvh;
    position:relative;
    -webkit-tap-highlight-color:transparent;
  }

  /* ---------- floating background hearts (CSS only) ---------- */
  .hearts-bg{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;}
  .heart{
    position:absolute;
    bottom:-10%;
    left:var(--left);
    width:var(--size);
    height:var(--size);
    background:var(--accent);
    transform:rotate(-45deg);
    opacity:0;
    animation:floatHeart var(--duration) linear infinite;
    animation-delay:var(--delay);
  }
  .heart::before,.heart::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:inherit;
    border-radius:50%;
  }
  .heart::before{top:calc(var(--size) / -2);left:0;}
  .heart::after{top:0;left:calc(var(--size) / 2);}

  @keyframes floatHeart{
    0%{transform:translateY(0) rotate(-45deg) scale(.7);opacity:0;}
    8%{opacity:.22;}
    50%{opacity:.3;}
    92%{opacity:.12;}
    100%{transform:translateY(-115vh) rotate(-25deg) scale(1.05);opacity:0;}
  }

  /* ---------- screens ---------- */
  .screen{
    display:none;
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;
    min-height:100dvh;
    align-items:center;
    justify-content:center;
    padding:max(28px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
  }
  .screen.active{
    display:flex;
    animation:screenIn .7s var(--ease);
  }
  .screen.fade-out{
    animation:screenOut .35s ease forwards;
  }
  @keyframes screenIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes screenOut{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-12px);}}

  .welcome-content,.final-content{
    text-align:center;
    max-width:460px;
    width:100%;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:.75rem;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--accent-dark);
    background:var(--accent-tint);
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:22px;
  }

  h1.welcome-title{
    font-size:clamp(1.6rem, 5.2vw, 2.5rem);
    font-weight:700;
    letter-spacing:-0.02em;
    line-height:1.25;
    margin:0 0 14px;
  }

  .welcome-sub, .final-sub{
    font-size:clamp(1rem, 2.6vw, 1.15rem);
    color:var(--text-soft);
    line-height:1.7;
    margin:0 0 34px;
    font-weight:500;
  }

  .final-message{
    font-size:clamp(1.15rem, 3.4vw, 1.5rem);
    font-weight:600;
    line-height:1.7;
    margin:0 0 36px;
  }

  .btn{
    font-family:inherit;
    font-weight:600;
    font-size:1rem;
    color:#fff;
    background:var(--accent);
    border:none;
    border-radius:999px;
    padding:15px 38px;
    min-height:50px;
    cursor:pointer;
    box-shadow:var(--shadow-strong);
    transition:transform .25s var(--ease), box-shadow .25s ease, background .25s ease;
  }
  .btn:hover{transform:translateY(-3px);background:var(--accent-dark);box-shadow:0 22px 44px rgba(255,92,138,.32);}
  .btn:active{transform:translateY(0) scale(.95);box-shadow:0 8px 18px rgba(255,92,138,.28);}

  /* ---------- cards screen ---------- */
  .progress-indicator{
    position:absolute;
    top:max(22px, env(safe-area-inset-top));
    left:50%;
    transform:translateX(-50%);
    background:var(--card-bg);
    color:var(--accent-dark);
    font-weight:700;
    font-size:.82rem;
    letter-spacing:.03em;
    padding:9px 20px;
    border-radius:999px;
    box-shadow:var(--shadow);
    z-index:5;
  }

  .cards-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
    width:100%;
    margin-top:30px;
  }

  .card-stack{
    position:relative;
    width:min(90vw, 380px);
    height:clamp(290px, 46vh, 380px);
  }

  .card{
    position:absolute;
    inset:0;
    background:var(--card-bg);
    border-radius:26px;
    box-shadow:var(--shadow);
    padding:clamp(26px, 6vw, 42px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    transition:transform .6s var(--ease), opacity .6s ease;
    will-change:transform, opacity;
  }

  .card-heart{
    width:22px;
    height:22px;
    position:relative;
    transform:rotate(-45deg);
    background:var(--accent);
    margin-bottom:20px;
    flex-shrink:0;
    opacity:.9;
  }
  .card-heart::before,.card-heart::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:inherit;
    border-radius:50%;
  }
  .card-heart::before{top:-11px;left:0;}
  .card-heart::after{top:0;left:11px;}

  .card-text{
    font-size:clamp(1.05rem, 3.6vw, 1.32rem);
    font-weight:500;
    line-height:1.65;
    margin:0;
    color:var(--text);
  }

  .card.pos-front{transform:translateY(0) translateX(0) scale(1) rotate(0deg);opacity:1;z-index:5;cursor:pointer;}
  .card.pos-1{transform:translateY(16px) scale(.94) rotate(-3deg);opacity:.7;z-index:4;pointer-events:none;}
  .card.pos-2{transform:translateY(30px) scale(.88) rotate(3deg);opacity:.45;z-index:3;pointer-events:none;}
  .card.pos-hidden{transform:translateY(30px) scale(.82) rotate(3deg);opacity:0;z-index:1;pointer-events:none;}
  .card.pos-exited{transform:translateY(-58px) translateX(34px) scale(.92) rotate(-9deg);opacity:0;z-index:6;pointer-events:none;}

  .controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
  }

  .next-btn{
    width:54px;
    height:54px;
    border-radius:50%;
    border:none;
    background:var(--card-bg);
    color:var(--accent);
    font-size:1.4rem;
    box-shadow:var(--shadow);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:transform .25s var(--ease), box-shadow .25s ease, color .25s ease, background .25s ease;
  }
  .next-btn:hover{background:var(--accent);color:#fff;transform:translateY(-3px);}
  .next-btn:active{transform:scale(.92);}

  .hint{
    font-size:.8rem;
    color:var(--text-soft);
    font-weight:500;
  }

  /* ---------- responsive tweaks ---------- */
  @media (max-width:360px){
    .card{padding:22px;}
    .card-text{font-size:1rem;}
  }

  @media (min-width:900px){
    .card-stack{width:420px;height:380px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
    .heart{display:none;}
  }
</style>
</head>
<body>

  <div class="hearts-bg" aria-hidden="true">
    <span class="heart" style="--left:4%;  --size:14px; --duration:16s; --delay:-2s;"></span>
    <span class="heart" style="--left:14%; --size:10px; --duration:13s; --delay:-7s;"></span>
    <span class="heart" style="--left:24%; --size:18px; --duration:19s; --delay:-4s;"></span>
    <span class="heart" style="--left:36%; --size:12px; --duration:15s; --delay:-9s;"></span>
    <span class="heart" style="--left:48%; --size:16px; --duration:21s; --delay:-1s;"></span>
    <span class="heart" style="--left:60%; --size:11px; --duration:14s; --delay:-6s;"></span>
    <span class="heart" style="--left:72%; --size:20px; --duration:23s; --delay:-11s;"></span>
    <span class="heart" style="--left:82%; --size:13px; --duration:17s; --delay:-3s;"></span>
    <span class="heart" style="--left:90%; --size:15px; --duration:18s; --delay:-8s;"></span>
    <span class="heart" style="--left:96%; --size:9px;  --duration:12s; --delay:-5s;"></span>
  </div>

  <!-- Welcome Screen -->
  <section id="welcomeScreen" class="screen active">
    <div class="welcome-content">
      <span class="eyebrow">For You</span>
      <h1 class="welcome-title">For Someone Very Special ❤️</h1>
      <p class="welcome-sub">I made this little thing just for you.</p>
      <button id="startBtn" class="btn">Start ❤️</button>
    </div>
  </section>

  <!-- Cards Screen -->
  <section id="cardsScreen" class="screen">
    <div class="progress-indicator" id="progressIndicator" aria-live="polite">1 / 10</div>
    <div class="cards-wrap">
      <div class="card-stack" id="cardStack"></div>
      <div class="controls">
        <button id="nextBtn" class="next-btn" aria-label="Next reason">→</button>
        <span class="hint">Tap the card or arrow to continue</span>
      </div>
    </div>
  </section>

  <!-- Final Screen -->
  <section id="finalScreen" class="screen">
    <div class="final-content">
      <p class="final-message">And these are only a few reasons...<br>I'd need a lifetime to tell you the rest. ❤️</p>
      <button id="shuffleBtn" class="btn">Shuffle Again ❤️</button>
    </div>
  </section>

<script>
(function(){
  "use strict";

  const reasons = [
    "You make ordinary days feel like little adventures.",
    "Your laugh is my favorite sound in the world.",
    "You listen, really listen, even when I'm rambling about nothing.",
    "You remember the small things that matter most to me.",
    "You make me want to be a better person, just by being yourself.",
    "Your hugs feel like home, no matter where we are.",
    "You believe in me on the days I don't believe in myself.",
    "You find joy in the little things, and somehow that joy is contagious.",
    "Even on hard days, you choose us, over and over again.",
    "You love me exactly as I am, and that has changed everything."
  ];

  let order = reasons.map((_, i) => i);
  let currentIndex = 0;

  const welcomeScreen = document.getElementById('welcomeScreen');
  const cardsScreen = document.getElementById('cardsScreen');
  const finalScreen = document.getElementById('finalScreen');
  const startBtn = document.getElementById('startBtn');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const nextBtn = document.getElementById('nextBtn');
  const cardStack = document.getElementById('cardStack');
  const progressIndicator = document.getElementById('progressIndicator');

  // Build the 10 persistent card elements once.
  const cardEls = order.map(() => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = '<span class="card-heart" aria-hidden="true"></span><p class="card-text"></p>';
    cardStack.appendChild(el);
    return el;
  });

  function render(){
    cardEls.forEach((el, pos) => {
      const reasonIndex = order[pos];
      el.querySelector('.card-text').textContent = reasons[reasonIndex];

      const distance = pos - currentIndex;
      el.classList.remove('pos-front','pos-1','pos-2','pos-hidden','pos-exited');

      if (distance === 0) el.classList.add('pos-front');
      else if (distance === 1) el.classList.add('pos-1');
      else if (distance === 2) el.classList.add('pos-2');
      else if (distance < 0) el.classList.add('pos-exited');
      else el.classList.add('pos-hidden');
    });

    progressIndicator.textContent = (currentIndex + 1) + ' / ' + reasons.length;
  }

  function nextCard(){
    if (currentIndex < reasons.length - 1){
      currentIndex++;
      render();
    } else {
      switchScreen(cardsScreen, finalScreen);
    }
  }

  function shuffleOrder(arr){
    for (let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function switchScreen(fromEl, toEl){
    fromEl.classList.add('fade-out');
    setTimeout(() => {
      fromEl.classList.remove('active','fade-out');
      toEl.classList.add('active');
    }, 350);
  }

  startBtn.addEventListener('click', () => {
    switchScreen(welcomeScreen, cardsScreen);
  });

  nextBtn.addEventListener('click', nextCard);

  cardStack.addEventListener('click', (e) => {
    if (e.target.closest('.pos-front')) nextCard();
  });

  shuffleBtn.addEventListener('click', () => {
    shuffleOrder(order);
    currentIndex = 0;
    render();
    switchScreen(finalScreen, cardsScreen);
  });

  document.addEventListener('keydown', (e) => {
    if (!cardsScreen.classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === 'Enter' || e.key === ' '){
      e.preventDefault();
      nextCard();
    }
  });

  render();
})();
</script>

</body>
</html>
